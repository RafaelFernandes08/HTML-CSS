<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Sunny';
            src: url('fonts/Sunny Script.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        body{
            font-family: 'Sunny', 'Times','sans-serif';
            text-align: justify;
            font-weight: normal;
        }
        h1{
            font-family: 'Sunny', 'Times', 'sans-serif';
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Tempore, repellendus ipsa consectetur architecto, mollitia dignissimos laborum sit pariatur aut magni veniam. Officia nesciunt cupiditate magni id voluptas assumenda velit iure!</p>
    
</body>
</html>
