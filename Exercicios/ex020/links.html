<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: chartreuse;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: green;
        }
        a:hover{
            color: yellowgreen;
            text-decoration: underline;
        }
        .especial{
            background-color: blue;
        }
        .especial::before{
            content: '» ';
        }
        .especial::after{
            content: ' «';
        }


    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a target="_blank" rel="external" href="https://github.com/gustavoguanabara">Repositorio GitHub</a></li>
        <li><a target="_blank" rel="external" href="https://www.youtube.com/@cursoemvideo" class="especial">Canal do youtube</a></li>
        <li><a target="_blank" rel="external" href="https://www.cursoemvideo.com/">Site cursoemvideo</a></li>
    </ul>
</body>
</html>
